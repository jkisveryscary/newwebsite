<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carson Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080b10;
      --panel:   #0d1520;
      --border:  #1a2840;
      --accent:  #00e5ff;
      --accent2: #ff2d78;
      --accent3: #a259ff;
      --text:    #c8d8e8;
      --muted:   #3a5060;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* scanlines — behind UI so buttons are clean */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
    }

    canvas {
      position: fixed; inset: 0; z-index: 0;
      display: block;
    }

    .hub {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
    }

    /* title */
    .title-block {
      text-align: center;
      margin-bottom: 3rem;
      opacity: 0; transform: translateY(-28px);
      animation: dropIn .65s cubic-bezier(.22,1,.36,1) .1s forwards;
    }

    .site-eyebrow {
      font-size: .7rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--accent); font-weight: 700;
      margin-bottom: .6rem;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
    }
    .site-eyebrow::before, .site-eyebrow::after {
      content: ''; display: block;
      width: 32px; height: 1px; background: rgba(0,229,255,.4);
    }

    .site-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: .06em;
      color: #e2eff8;
      text-shadow: 0 0 60px rgba(0,229,255,.18), 0 2px 0 rgba(0,0,0,.8);
    }
    .site-title .hl {
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none;
    }

    /* buttons */
    .nav-buttons {
      display: flex; flex-direction: column;
      gap: .75rem;
      width: 100%; max-width: 420px;
    }

    .nav-btn {
      position: relative;
      display: flex; align-items: center;
      gap: 1.1rem;
      padding: 1rem 1.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      translate: 0 0;
      transition: border-color .4s ease, translate .4s cubic-bezier(.22,1,.36,1), box-shadow .4s ease;
      opacity: 0; transform: translateY(22px);
    }

    .nav-btn:hover {
      translate: 8px 0;
      border-color: var(--btn-color, var(--accent));
      box-shadow: inset 0 0 0 1px var(--btn-color, var(--accent)),
                  0 0 24px rgba(0,0,0,.5),
                  4px 0 20px color-mix(in srgb, var(--btn-color, var(--accent)) 30%, transparent);
    }

    .nav-btn::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--btn-color, var(--accent));
      box-shadow: 0 0 10px var(--btn-color, var(--accent));
      transition: width .3s ease;
    }
    .nav-btn:hover::before { width: 5px; }

    .nav-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, color-mix(in srgb, var(--btn-color, var(--accent)) 8%, transparent), transparent 60%);
      opacity: 0; transition: opacity .3s ease;
    }
    .nav-btn:hover::after { opacity: 1; }

    .btn-label { flex: 1; position: relative; z-index: 1; }

    .btn-arrow {
      font-size: .9rem; color: var(--muted);
      position: relative; z-index: 1;
      transition: color .3s ease, transform .3s cubic-bezier(.22,1,.36,1);
    }
    .nav-btn:hover .btn-arrow {
      color: var(--btn-color, var(--accent));
      transform: translateX(4px);
    }

    .animate-in { animation: dropIn .55s cubic-bezier(.22,1,.36,1) forwards; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>

  <main class="hub">
    <div class="title-block">
      <div class="site-title">CARSON<span class="hl">GAMES</span></div>
    </div>

    <nav class="nav-buttons" id="navButtons">
      <a class="nav-btn" href="./games/index.html" style="--btn-color:#00e5ff;">
        <span class="btn-label">Games</span>
        <span class="btn-arrow">▶</span>
      </a>
      <a class="nav-btn" href="./minecraft/index.html" style="--btn-color:#00e5ff;">
        <span class="btn-label">Minecraft Server</span>
        <span class="btn-arrow">▶</span>
      </a>
      <a class="nav-btn" href="./discord/index.html" style="--btn-color:#00e5ff;">
        <span class="btn-label">Discord</span>
        <span class="btn-arrow">▶</span>
      </a>
      <a class="nav-btn" href="./donate/index.html" style="--btn-color:#00e5ff;">
        <span class="btn-label">Donate</span>
        <span class="btn-arrow">▶</span>
      </a>
      <a class="nav-btn" href="./contribute/index.html" style="--btn-color:#00e5ff;">
        <span class="btn-label">Help Make the Website</span>
        <span class="btn-arrow">▶</span>
      </a>
    </nav>
  </main>

  <script>
    // ── Staggered button entrance ──
    document.querySelectorAll('.nav-btn').forEach((btn, i) => {
      btn.style.animationDelay = `${.35 + i * .09}s`;
      btn.classList.add('animate-in');
    });

    // ── Particle network background ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    const PARTICLE_COUNT = 90;
    const CONNECT_DIST   = 140;
    const MOUSE_RADIUS   = 120;
    const DOT_RADIUS     = 1.8;
    const SPEED          = 0.35;

    let W, H, particles;
    let mouse = { x: null, y: null, dragging: false };
    let grabbed = null; // particle being dragged

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function makeParticle() {
      const angle = rand(0, Math.PI * 2);
      const speed = rand(SPEED * 0.4, SPEED);
      return {
        x:  rand(0, W),
        y:  rand(0, H),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r:  rand(1.2, DOT_RADIUS),
        // subtle wander
        wander: rand(0, Math.PI * 2),
        wanderSpeed: rand(0.003, 0.012),
        opacity: rand(0.4, 1),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: PARTICLE_COUNT }, makeParticle);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // update
      for (const p of particles) {
        if (p === grabbed) continue;

        // gentle wander: nudge velocity direction slowly
        p.wander += p.wanderSpeed;
        p.vx += Math.cos(p.wander) * 0.008;
        p.vy += Math.sin(p.wander) * 0.008;

        // clamp speed
        const spd = Math.hypot(p.vx, p.vy);
        if (spd > SPEED) { p.vx = (p.vx / spd) * SPEED; p.vy = (p.vy / spd) * SPEED; }

        // mouse repulsion (non-dragged)
        if (mouse.x !== null) {
          const dx = p.x - mouse.x, dy = p.y - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < MOUSE_RADIUS && dist > 0) {
            const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * 0.6;
            p.vx += (dx / dist) * force;
            p.vy += (dy / dist) * force;
          }
        }

        p.x += p.vx;
        p.y += p.vy;

        // wrap edges
        if (p.x < -20)  p.x = W + 20;
        if (p.x > W+20) p.x = -20;
        if (p.y < -20)  p.y = H + 20;
        if (p.y > H+20) p.y = -20;
      }

      // dragged particle follows mouse smoothly
      if (grabbed && mouse.x !== null) {
        grabbed.x += (mouse.x - grabbed.x) * 0.18;
        grabbed.y += (mouse.y - grabbed.y) * 0.18;
        grabbed.vx = (mouse.x - grabbed.x) * 0.1;
        grabbed.vy = (mouse.y - grabbed.y) * 0.1;
      }

      // draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < CONNECT_DIST) {
            const alpha = (1 - dist / CONNECT_DIST) * 0.22;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(0,229,255,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      // draw dots
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${p.opacity * 0.75})`;
        ctx.shadowColor = '#00e5ff';
        ctx.shadowBlur = p === grabbed ? 14 : 6;
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      requestAnimationFrame(draw);
    }

    // ── mouse / touch ──
    function nearestParticle(x, y) {
      let best = null, bestD = Infinity;
      for (const p of particles) {
        const d = Math.hypot(p.x - x, p.y - y);
        if (d < bestD) { bestD = d; best = p; }
      }
      return bestD < 40 ? best : null;
    }

    canvas.addEventListener('mousemove', e => {
      mouse.x = e.clientX; mouse.y = e.clientY;
    });
    canvas.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

    canvas.addEventListener('mousedown', e => {
      grabbed = nearestParticle(e.clientX, e.clientY);
      if (!grabbed) {
        // grab the nearest one anyway within larger radius
        let best = null, bestD = Infinity;
        for (const p of particles) {
          const d = Math.hypot(p.x - e.clientX, p.y - e.clientY);
          if (d < bestD) { bestD = d; best = p; }
        }
        if (bestD < 80) grabbed = best;
      }
    });
    canvas.addEventListener('mouseup', () => { grabbed = null; });

    // touch
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      mouse.x = t.clientX; mouse.y = t.clientY;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      mouse.x = t.clientX; mouse.y = t.clientY;
      grabbed = nearestParticle(t.clientX, t.clientY) ||
        (() => { let b=null,bd=Infinity; for(const p of particles){const d=Math.hypot(p.x-t.clientX,p.y-t.clientY);if(d<bd){bd=d;b=p;}} return bd<80?b:null; })();
    });
    canvas.addEventListener('touchend', () => { grabbed = null; mouse.x = null; mouse.y = null; });

    window.addEventListener('resize', () => { resize(); });

    init();
    draw();
  </script>
</body>
</html>
